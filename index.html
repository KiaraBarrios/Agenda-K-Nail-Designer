<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K Nail Designer // BETA_SYS</title>
  <style>
    /* ESTÉTICA */
    body {
      background-color: #050505;
      color: #e0e0e0;
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .terminal-box {
      max-width: 450px;
      width: 100%;
      border: 2px solid #333;
      padding: 30px;
      background: #0a0a0a;
      box-shadow: 8px 8px 0px #222;
    }
    h1 {
      font-size: 1.8em;
      margin-top: 0;
      text-transform: uppercase;
      border-bottom: 2px dashed #444;
      padding-bottom: 15px;
      letter-spacing: 2px;
    }
    .blink {
      animation: blinker 1s linear infinite;
    }
    @keyframes blinker {
      50% { opacity: 0; }
    }
    label {
      display: block;
      margin-top: 20px;
      font-weight: bold;
      font-size: 0.9em;
      color: #aaa;
    }
    input, select {
      width: 100%;
      background: #000;
      border: 1px solid #555;
      color: #fff;
      padding: 12px;
      font-family: inherit;
      margin-top: 8px;
      box-sizing: border-box;
      transition: 0.3s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #fff;
      background: #111;
    }
    button {
      width: 100%;
      padding: 15px;
      background: #fff;
      color: #000;
      font-weight: bold;
      font-size: 1.1em;
      border: none;
      font-family: inherit;
      margin-top: 30px;
      cursor: pointer;
      text-transform: uppercase;
      transition: 0.2s;
    }
    button:hover {
      background: #ccc;
      transform: translateY(2px);
      box-shadow: none;
    }
    .footer-text {
      text-align: center;
      font-size: 0.7em;
      color: #555;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="terminal-box">
    <h1>> K Nail Designer<span class="blink">_</span> <br>
        <span style="font-size: 12px; color: #777;">// USER_REGISTRATION_BETA</span>
    </h1>

    <form id="kmodeForm">
      <label>> INPUT_USER_NAME:</label>
      <input type="text" id="nome" required placeholder="Digite seu nome completo">

      <label>> SELECT_SYSTEM (Técnica):</label>
      <select id="tecnica" required>
        <option value="Postiça Realista (R$50)">[01] Postiça Realista (Soft Gel) - R$ 50,00</option>
        <option value="Molde F1 (R$60)">[02] Molde F1 - R$ 60,00</option>
        <option value="Fibra de Vidro (R$70)">[03] Fibra de Vidro - R$ 70,00</option>
      </select>

      <label>> SYS_TIME_AVAILABLE (Disponibilidade):</label>
      <select id="horario" required>
        <option value="Manhã">[TIME] Manhã</option>
        <option value="Tarde">[TIME] Tarde</option>
        <option value="Noite">[TIME] Noite</option>
      </select>

      <button type="button" onclick="runSystem()">[ RUN_SYSTEM ] // ENVIAR</button>
    </form>

    <div class="footer-text">
      > ENDEREÇO: CAMPINAS, SP <br>
    </div>
  </div>

  <script>
    function runSystem() {
      // Coleta os dados do formulário
      const nome = document.getElementById('nome').value;
      const tecnica = document.getElementById('tecnica').value;
      const horario = document.getElementById('horario').value;

      if(nome === "") {
        alert("ERRO_DE_SISTEMA: Por favor, insira seu nome.");
        return;
      }

      // SEU NÚMERO DE WHATSAPP AQUI (coloque o DDI e DDD, ex: 5519999999999)
      const phone = "5519983055254"; 

      // Cria a mensagem estilizada para o WhatsApp
      const text = `> Olá, K! Quero garantir minha vaga como modelo.\n\n[USER]: ${nome}\n[TECH]: ${tecnica}\n[TIME]: ${horario}\n\nAguardando confirmação...`;
      
      // Converte o texto para formato de URL
      const encodedText = encodeURIComponent(text);
      
      // Redireciona a usuária para o seu WhatsApp
      window.open(`https://wa.me/${phone}?text=${encodedText}`, '_blank');
    }
  </script>

</body>
</html>
